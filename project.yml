name: Osmo
options:
  bundleIdPrefix: com.osmo
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

# The Osmo Swift package (this same directory) provides the OsmoCore + OsmoBrain
# library products; the app target links them. Regenerate the project any time
# with `xcodegen generate`.
packages:
  Osmo:
    path: .
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

targets:
  Osmo:
    type: application
    platform: macOS
    sources:
      - path: App/Sources
      - path: App/Resources
    dependencies:
      - package: Osmo
        product: OsmoCore
      - package: Osmo
        product: OsmoBrain
      - package: Osmo
        product: OsmoShell
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.osmo.app
        PRODUCT_NAME: Osmo
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.2.1"
        CURRENT_PROJECT_VERSION: "3"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Osmo.entitlements
        # Sign with a STABLE self-signed identity ("Osmo Dev Signing") instead of
        # ad-hoc "-". Ad-hoc's code hash changes every build, so macOS resets every
        # TCC grant (Full Disk Access, Accessibility) and Keychain ACL on each
        # rebuild — forcing the user to re-approve constantly. A stable identity
        # keeps those grants across rebuilds. Create the identity once with
        # scripts/setup-signing.sh; builds fall back to ad-hoc if it's absent.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Osmo Dev Signing"
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: NO
        OTHER_CODE_SIGN_FLAGS: "--deep"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        COMBINE_HIDPI_IMAGES: YES

schemes:
  Osmo:
    build:
      targets:
        Osmo: all
    run:
      config: Debug
