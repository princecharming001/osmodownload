name: Osmo
options:
  bundleIdPrefix: com.osmo
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

# The Osmo Swift package (this same directory) provides the OsmoCore + OsmoBrain
# library products; the app target links them. Regenerate the project any time
# with `xcodegen generate`.
packages:
  Osmo:
    path: .

targets:
  Osmo:
    type: application
    platform: macOS
    sources:
      - path: App/Sources
    dependencies:
      - package: Osmo
        product: OsmoCore
      - package: Osmo
        product: OsmoBrain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.osmo.app
        PRODUCT_NAME: Osmo
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Osmo.entitlements
        # Local run: ad-hoc signing, no team required (like "Sign to Run Locally").
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        COMBINE_HIDPI_IMAGES: YES

schemes:
  Osmo:
    build:
      targets:
        Osmo: all
    run:
      config: Debug
