# Osmo OTA release — build → notarize → Sparkle-sign → publish appcast, so
# installed apps auto-update. TAG-TRIGGERED (recommended): push a tag like
# `v0.3.1` and this ships that version to everyone. (Change `on:` to push→branch
# if you truly want every commit to ship — riskier.)
#
# One-time setup — add these in GitHub → repo Settings → Secrets and variables → Actions:
#   Secrets:
#     DEVELOPER_ID_P12_BASE64   base64 of your exported "Developer ID Application" .p12
#                               (Keychain Access → export the cert+key → `base64 -i cert.p12 | pbcopy`)
#     DEVELOPER_ID_P12_PASSWORD the password you set when exporting the .p12
#     KEYCHAIN_PASSWORD         any random string (temp CI keychain)
#     NOTARY_KEY_P8             contents of your App Store Connect API key AuthKey_422MKHNWD5.p8
#     NOTARY_KEY_ID             422MKHNWD5
#     NOTARY_ISSUER             c4c8d671-d14d-48b8-a605-94c23a63b2fa
#     SPARKLE_PRIVATE_KEY       the EdDSA private key — export once with:
#                               .build/…/Sparkle/bin/generate_keys -x /dev/stdout
#     LEFTONREAD_TOKEN          a GitHub PAT with repo access to princecharming001/leftonread
#   Variables:
#     OSMO_SIGN_IDENTITY        Developer ID Application: Anish Polakala (3TJ8RC3JCX)
#     OSMO_TEAM_ID              3TJ8RC3JCX

name: Release (notarize + Sparkle OTA)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to ship, e.g. 0.3.1"
        required: true

jobs:
  release:
    runs-on: macos-15          # newer default Xcode (16.x) — reads xcodegen's project format 77
    environment: osmosecrets   # secrets + vars live in this GitHub Environment
    steps:
      - uses: actions/checkout@v4

      - name: Use latest installed Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          [ -n "$LATEST" ] && sudo xcode-select -s "$LATEST" || true
          xcodebuild -version

      - name: Derive version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then V="${{ github.event.inputs.version }}"; else V="${GITHUB_REF_NAME#v}"; fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Shipping Osmo $V (build ${GITHUB_RUN_NUMBER})"

      - name: Tools
        run: brew install xcodegen

      - name: Bump version in project.yml
        run: |
          V="${{ steps.ver.outputs.version }}"
          # Build number MUST monotonically exceed the installed build (0.2.1 = build 3)
          # or Sparkle won't offer the update. Epoch seconds is always-increasing + >> 3.
          BUILD=$(date +%s)
          /usr/bin/sed -i '' -E "s/MARKETING_VERSION: \"[^\"]*\"/MARKETING_VERSION: \"$V\"/" project.yml
          /usr/bin/sed -i '' -E "s/CURRENT_PROJECT_VERSION: \"[^\"]*\"/CURRENT_PROJECT_VERSION: \"$BUILD\"/" project.yml
          grep -E "MARKETING_VERSION|CURRENT_PROJECT_VERSION" project.yml

      - name: Import Developer ID certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          KC_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$KC_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KC_PASSWORD" build.keychain
          security set-keychain-settings -lut 3600 build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KC_PASSWORD" build.keychain
          rm /tmp/cert.p12

      - name: Stage notary + Sparkle keys
        env:
          NOTARY_KEY_P8: ${{ secrets.NOTARY_KEY_P8 }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          # NOTARY_KEY_P8 is base64 (raw multi-line PEM gets mangled pasting into a secret).
          printf '%s' "$NOTARY_KEY_P8" | base64 --decode > "$HOME/.appstoreconnect/private_keys/AuthKey.p8"
          printf '%s' "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_ed_key
          # Export the ABSOLUTE key path for later steps ($HOME resolves here; the
          # ${{ env.HOME }} expression context is empty, which broke notarytool).
          echo "OSMO_NOTARY_KEY_PATH=$HOME/.appstoreconnect/private_keys/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Build + notarize + staple
        env:
          OSMO_TEAM_ID: ${{ vars.OSMO_TEAM_ID }}
          OSMO_SIGN_IDENTITY: ${{ vars.OSMO_SIGN_IDENTITY }}
          OSMO_NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          OSMO_NOTARY_ISSUER: ${{ secrets.NOTARY_ISSUER }}
          # OSMO_NOTARY_KEY_PATH comes from $GITHUB_ENV (absolute path with real $HOME)
          OSMO_VERSION: ${{ steps.ver.outputs.version }}
        run: ./scripts/release.sh

      - name: Sign + generate appcast, publish to leftonread
        env:
          LEFTONREAD_TOKEN: ${{ secrets.LEFTONREAD_TOKEN }}
          GH_TOKEN: ${{ secrets.LEFTONREAD_TOKEN }}
          SPARKLE_ED_KEY_FILE: /tmp/sparkle_ed_key
        run: |
          V="${{ steps.ver.outputs.version }}"
          git clone "https://x-access-token:${LEFTONREAD_TOKEN}@github.com/princecharming001/leftonread.git" /tmp/leftonread
          OSMO_SITE_REPO=/tmp/leftonread ./scripts/publish-appcast.sh "$V"
          # 1) upload the notarized zip to the GitHub release (create or clobber)
          gh release create "v$V" ".build/appcast/Osmo-$V.zip" --repo princecharming001/leftonread \
            --title "Osmo $V" --notes "Auto-update release" --latest \
          || gh release upload "v$V" ".build/appcast/Osmo-$V.zip" --repo princecharming001/leftonread --clobber
          # 2) push the freshly-signed appcast so leftonread.in/appcast.xml updates
          cd /tmp/leftonread
          git config user.name "osmo-ci"; git config user.email "ci@osmo.local"
          git add appcast.xml
          git commit -m "OTA: Osmo $V appcast" && git push || echo "appcast unchanged"
