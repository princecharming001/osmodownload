# Backend (web/) verification — typecheck + tests + build on every PR/push that
# touches web/. Distinct from release.yml (Swift/Sparkle OTA). Runs no deploy.
name: web-verify

on:
  push:
    paths: ["web/**", ".github/workflows/web-verify.yml"]
  pull_request:
    paths: ["web/**", ".github/workflows/web-verify.yml"]

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      # --include=dev so tsc + @types are present (same rationale as render.yaml's build).
      - run: npm ci --include=dev
      - run: npm run verify:full
